# Single-API deployment — see docs/deployment.md.
#
# Start:  docker compose up --build
# Logs:   docker compose logs -f api
# Stop:   docker compose down
#
# The ``neuroner`` service is optional — only enable it if any pipeline uses
# the NeuroNER sidecar pipe. See neuroner-cspmc/sidecar/ for the sidecar
# image; uncomment ``neuroner`` below with matching build context if needed.

services:
  api:
    build:
      context: .
      args:
        # Default extras. ``scripts`` = Faker/pandas for surrogate output_mode.
        # Presidio, spaCy, transformers/torch, and LLM clients are in the base install.
        # Append ``train`` (datasets/seqeval/accelerate) only for fine-tuning inside the container.
        EXTRAS: parquet,scripts
    image: clinical-deid-api:latest
    ports:
      - "8000:8000"
    # Optional: copy ``.env.example`` → ``.env`` and set keys, CORS, etc. Keys are not set in this file
    # so values from ``.env`` are not overridden (see docs/deployment.md).
    env_file:
      - path: .env
        required: false
    environment:
      # CORS — JSON array. Include every browser origin that will call the API (Playground :3000, prod UI :3001).
      CLINICAL_DEID_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","http://localhost:3001","http://127.0.0.1:3001"]'

      # 10 MiB default — tune for batch workloads if needed.
      CLINICAL_DEID_MAX_BODY_BYTES: "10485760"

      # NeuroNER sidecar URL — only used when a pipeline uses the neuroner_ner pipe.
      CLINICAL_DEID_NEURONER_HTTP_URL: http://neuroner:8765

      # All mutable state under /app/data; model weights under /app/models. These
      # match the in-code defaults — set explicitly so operators can grep for paths.
      CLINICAL_DEID_DATABASE_URL: sqlite:///./data/app.sqlite
      CLINICAL_DEID_PIPELINES_DIR: /app/data/pipelines
      CLINICAL_DEID_MODES_PATH: /app/data/modes.json
      CLINICAL_DEID_EVALUATIONS_DIR: /app/data/evaluations
      CLINICAL_DEID_INFERENCE_RUNS_DIR: /app/data/inference_runs
      CLINICAL_DEID_CORPORA_DIR: /app/data/corpora
      CLINICAL_DEID_DICTIONARIES_DIR: /app/data/dictionaries
      CLINICAL_DEID_MODELS_DIR: /app/models

      # Default audit DB is SQLite. Multiple workers increase concurrent writes to ``app.sqlite``; use ``1``
      # for fewer "database is locked" surprises, or point ``CLINICAL_DEID_DATABASE_URL`` at PostgreSQL.
      WEB_CONCURRENCY: "2"
    volumes:
      # All runtime state — edit pipelines/modes via the Playground admin UI
      # or by replacing files on the host.
      - ./data:/app/data
      # Model weights are immutable at runtime.
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Optional NeuroNER sidecar. Uncomment if a deployed pipeline uses it.
  # neuroner:
  #   build:
  #     context: .
  #     dockerfile: neuroner-cspmc/sidecar/Dockerfile
  #   volumes:
  #     - ./models/neuroner:/models/neuroner:ro
  #     - ./data/word_vectors:/data/word_vectors:ro
  #     - ./data/neuroner_deploy:/data/neuroner_deploy:ro
  #   environment:
  #     NEURONER_MODELS_ROOT: /models/neuroner
  #     NEURONER_DEFAULT_MODEL: i2b2_2014_glove_spacy_bioes
  #     NEURONER_DATASET_TEXT_FOLDER: /data/neuroner_deploy
  #     NEURONER_TOKEN_EMBEDDING: /data/word_vectors/glove.6B.100d.txt
  #     NEURONER_OUTPUT_FOLDER: /tmp/neuroner_out
  #   expose:
